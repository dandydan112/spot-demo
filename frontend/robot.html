<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Robot</title>
  <link rel="icon" href="/static/img/favicon.ico">
  <link rel="stylesheet" href="/static/css/robot.css?v=1">
  <link rel="stylesheet" href="/static/css/base.css?v=1">
</head>
<body>
  <header class="shell header-flex">
    <img src="/static/img/logo.png" alt="Teknologisk Institut" class="logo">
    <a href="/" class="back">← Tilbage</a>
  </header>

  <main class="shell">
    <h1 id="title">Robot</h1>

    <!-- Switch mellem visninger -->
    <div class="switcher" style="margin-bottom:15px;">
      <button onclick="showView('camera')">Front Camera</button>
      <button onclick="showView('map')">3D Visualizer</button>
    </div>

    <!-- Kamera-visning -->
    <div id="cameraView" class="video-wrap">
      <img id="mjpeg" alt="stream">
      <canvas id="overlay"></canvas>
    </div>

    <!-- 3D-visualizer -->
    <div id="mapView" style="display:none; width:100%; height:500px;">
      <canvas id="mapCanvas" style="width:100%; height:100%;"></canvas>
    </div>

    <!-- Controls: status + knapper -->
    <div class="controls">
      <!-- Status indikator -->
      <div class="status-indicator">
        <span id="dot" class="dot offline"></span>
        <span id="status" class="muted">Ukendt</span>
      </div>

      <!-- Demo-knapper + feedback felt -->
      <div class="demo-controls">
        <button id="helloBtn">Hello Spot</button>
        <button id="layBtn">Lay Spot</button>
        <button id="powerOffBtn">Power Off</button>
        <span id="feedback" class="muted" style="margin-left:10px;"></span>
      </div>
    </div>
  </main>

  <!-- Three.js fra CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.155/build/three.min.js"></script>
  <!-- JS -->
  <script src="/static/js/robot.js?v=3"></script>
</body>
</html>
